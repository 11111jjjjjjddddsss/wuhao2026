name: Android CI

on:
  push:
    branches: [master]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - 'scripts/check_mojibake.py'
      - 'scripts/check-android-build-parity.ps1'
      - 'scripts/check_project_memory.py'
      - '.mojibake-baseline.txt'
      - 'AGENTS.md'
      - 'docs/project-state/**'
      - 'docs/adr/**'
      - 'docs/runbooks/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [master]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - 'scripts/check_mojibake.py'
      - 'scripts/check-android-build-parity.ps1'
      - 'scripts/check_project_memory.py'
      - '.mojibake-baseline.txt'
      - 'AGENTS.md'
      - 'docs/project-state/**'
      - 'docs/adr/**'
      - 'docs/runbooks/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  android-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
      ANDROID_HOME: ${{ github.workspace }}/android-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android command-line tools
        run: |
          set -euxo pipefail
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          curl -fsSL -o /tmp/android-cmdline-tools.zip \
            https://dl.google.com/android/repository/commandlinetools-linux-12266719_latest.zip
          unzip -q /tmp/android-cmdline-tools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
          mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/16.0"
          echo "$ANDROID_SDK_ROOT/cmdline-tools/16.0/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"

      - name: Install Android SDK components
        run: |
          retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${attempt} attempts: $*"
                return 1
              fi
              attempt=$((attempt + 1))
              echo "Retry ${attempt}/${max_attempts}: $*"
              sleep 5
            done
          }
          yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses
          retry 3 sdkmanager --sdk_root="$ANDROID_SDK_ROOT" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Mojibake check
        run: python3 scripts/check_mojibake.py

      - name: Project memory check
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          python3 scripts/check_project_memory.py --base "$BASE_SHA" --head "$HEAD_SHA"

      - name: Generate Android manifests for parity checks
        run: |
          chmod +x ./gradlew
          ./gradlew \
            :app:processDebugManifest \
            :app:processReleaseManifest \
            :app:processDebugManifestForPackage \
            :app:processReleaseManifestForPackage \
            --no-daemon --stacktrace

      - name: Android debug/release parity check
        run: pwsh -NoProfile -File scripts/check-android-build-parity.ps1

      - name: Ensure WebView demo entry removed
        run: |
          if git grep -n -E "gpt-demo|android_asset" -- app/src/main; then
            echo "Found forbidden WebView/demo references in app/src/main"
            exit 1
          fi
          webview_refs="$(git grep -n -E '\bWebView\b' -- app/src/main || true)"
          if [ -n "$webview_refs" ]; then
            printf "%s\n" "$webview_refs"
            echo "Found unexpected WebView references in app/src/main"
            exit 1
          fi

      - name: Android compile
        env:
          BAILIAN_API_KEY: ci_dummy_key
        run: |
          chmod +x ./gradlew
          retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${attempt} attempts: $*"
                return 1
              fi
              attempt=$((attempt + 1))
              echo "Retry ${attempt}/${max_attempts}: $*"
              sleep 5
            done
          }
          retry 2 ./gradlew :app:compileDebugKotlin --no-daemon --stacktrace
