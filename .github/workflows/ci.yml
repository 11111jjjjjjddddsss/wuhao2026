name: Android CI

on:
  push:
    branches: [master]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - 'scripts/check_mojibake.py'
      - '.mojibake-baseline.txt'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [master]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - 'scripts/check_mojibake.py'
      - '.mojibake-baseline.txt'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  android-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${attempt} attempts: $*"
                return 1
              fi
              attempt=$((attempt + 1))
              echo "Retry ${attempt}/${max_attempts}: $*"
              sleep 5
            done
          }
          yes | sdkmanager --licenses
          retry 3 sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Mojibake check
        run: python3 scripts/check_mojibake.py

      - name: Ensure WebView demo entry removed
        run: |
          if git grep -n "gpt-demo|android_asset|WebView" -- app/src/main; then
            echo "Found forbidden WebView/demo references in app/src/main"
            exit 1
          fi

      - name: Android compile
        env:
          BAILIAN_API_KEY: ci_dummy_key
        run: |
          chmod +x ./gradlew
          retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${attempt} attempts: $*"
                return 1
              fi
              attempt=$((attempt + 1))
              echo "Retry ${attempt}/${max_attempts}: $*"
              sleep 5
            done
          }
          retry 2 ./gradlew :app:compileDebugKotlin --no-daemon --stacktrace
