name: Project Memory

on:
  push:
    branches: [master]
    paths:
      - 'app/**'
      - 'server-go/**'
      - 'admin/**'
      - 'site/**'
      - 'scripts/**'
      - 'docs/adr/**'
      - 'docs/runbooks/**'
      - 'docs/project-state/**'
      - 'AGENTS.md'
      - 'app/AGENTS.md'
      - 'server-go/AGENTS.md'
      - '.github/workflows/**'
  pull_request:
    branches: [master]
    paths:
      - 'app/**'
      - 'server-go/**'
      - 'admin/**'
      - 'site/**'
      - 'scripts/**'
      - 'docs/adr/**'
      - 'docs/runbooks/**'
      - 'docs/project-state/**'
      - 'AGENTS.md'
      - 'app/AGENTS.md'
      - 'server-go/AGENTS.md'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  project-memory:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Project memory check
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          base="$BASE_SHA"
          head="$HEAD_SHA"
          if [ -z "$base" ] || ! git cat-file -e "${base}^{commit}" 2>/dev/null || ! git merge-base --is-ancestor "$base" "$head" 2>/dev/null; then
            fallback="$(git rev-parse "${head}^" 2>/dev/null || true)"
            if [ -n "$fallback" ]; then
              echo "BASE_SHA '$base' is unavailable or not an ancestor of HEAD; using $fallback."
              base="$fallback"
            else
              echo "BASE_SHA '$base' is unavailable and HEAD has no parent; running working-tree memory check."
              python3 scripts/check_project_memory.py
              exit 0
            fi
          fi
          python3 scripts/check_project_memory.py --base "$base" --head "$head"
