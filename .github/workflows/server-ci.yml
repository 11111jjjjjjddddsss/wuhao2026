name: Backend CI

on:
  push:
    branches: [master]
    paths:
      - 'server/**'
      - 'upload-server/**'
      - '.github/workflows/server-ci.yml'
  pull_request:
    branches: [master]
    paths:
      - 'server/**'
      - 'upload-server/**'
      - '.github/workflows/server-ci.yml'
  workflow_dispatch:

jobs:
  api-server-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

  upload-server-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: upload-server
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: upload-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: node --check server.js
