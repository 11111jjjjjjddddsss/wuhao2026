name: Backend CI

on:
  push:
    branches: [master]
    paths:
      - 'server-go/**'
      - 'scripts/check_mojibake.py'
      - '.mojibake-baseline.txt'
      - '.github/workflows/server-ci.yml'
  pull_request:
    branches: [master]
    paths:
      - 'server-go/**'
      - 'scripts/check_mojibake.py'
      - '.mojibake-baseline.txt'
      - '.github/workflows/server-ci.yml'
  workflow_dispatch:

jobs:
  go-server-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: server-go
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Mojibake check
        working-directory: .
        run: python3 scripts/check_mojibake.py

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Download dependencies
        run: go mod download

      - name: Build Go backend
        run: go build ./...

      - name: Test Go backend
        run: go test ./...
