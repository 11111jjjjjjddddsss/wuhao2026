<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="农技千查是基于原生视觉语言模型的农业问诊 App，结合作物照片与症状描述，梳理现场线索，输出可供进一步核查的农技参考。"
    />
    <meta name="theme-color" content="#071009" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>农技千查 - 看清作物问题</title>
  </head>
  <body>
    <div class="page-shell">
      <main class="landing" id="top">
        <section class="hero" id="product" aria-labelledby="hero-title">
          <div class="hero-main">
            <div class="brand-lockup" aria-label="农技千查">
              <img class="brand-mark" src="/brand-mark.png" alt="" />
              <span>农技千查</span>
            </div>

            <div class="hero-copy-block">
              <h1 id="hero-title">
                <span>看清作物问题</span>
              </h1>
              <p class="hero-copy">
                基于原生视觉语言模型，结合作物照片与症状描述，梳理现场线索，输出可供进一步核查的农技参考。
              </p>
            </div>

            <div class="hero-actions">
              <a class="download-button" data-download>安卓版下载</a>
              <p class="service-note">内容仅供农技参考，不能替代线下诊断。</p>
            </div>
          </div>

          <aside class="capability-panel" aria-label="农技千查产品能力">
            <div class="capability-list">
              <article>
                <h2>原生视觉感知</h2>
                <p>从作物照片中识别病斑形态、虫害痕迹、叶片状态与长势变化，将现场画面转化为可分析的线索。</p>
              </article>
              <article>
                <h2>多模态线索融合</h2>
                <p>将图像、文字描述、地区季节及追问反馈整合到同一语境中，降低单张图像可能带来的误判风险。</p>
              </article>
              <article>
                <h2>稳健农技推理</h2>
                <p>面对病虫害、肥水管理及异常长势，先拆解可能原因与核查要点，再给出处理方向参考。</p>
              </article>
            </div>
          </aside>
        </section>
      </main>

      <footer class="site-footer">
        <span>北京农技千问科技有限公司</span>
        <span class="footer-links">
          <a href="https://beian.miit.gov.cn/" rel="noreferrer" target="_blank">京ICP备2026031728号-1</a>
          <a
            class="police-record"
            href="https://beian.mps.gov.cn/#/query/webSearch?code=11010602202723"
            rel="noreferrer"
            target="_blank"
          >
            <img src="/gongan.png" alt="" />
            <span>京公网安备11010602202723号</span>
          </a>
        </span>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
