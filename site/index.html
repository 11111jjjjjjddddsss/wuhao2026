<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="农技千查是面向农业场景的视觉语言问诊工具，支持文字与照片输入，辅助梳理作物病虫害、长势异常、施肥和农事风险。"
    />
    <meta name="theme-color" content="#071009" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>农技千查 - 农业视觉语言问诊</title>
  </head>
  <body>
    <div class="page-shell">
      <main class="landing" id="top">
        <section class="hero" aria-labelledby="hero-title">
          <div class="brand-lockup" aria-label="农技千查">
            <img class="brand-mark" src="/brand-mark.png" alt="" />
            <span>农技千查</span>
          </div>

          <div class="hero-copy-block">
            <p class="eyebrow">面向田间的图文问诊</p>
            <h1 id="hero-title">让作物问题<br />更清楚</h1>
            <p class="hero-copy">
              上传作物照片，补充症状描述，获得可继续追问的农业技术参考。
            </p>
            <p class="capability-line">照片理解 / 连续问诊 / 农技参考</p>
            <a class="download-button" data-download>安卓版下载</a>
          </div>

          <p class="service-note">内容仅供农技参考，不能替代线下诊断。</p>
        </section>
      </main>

      <footer class="site-footer">
        <a href="https://beian.miit.gov.cn/" rel="noreferrer" target="_blank">京ICP备2026031728号-1</a>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
